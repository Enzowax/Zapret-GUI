name: Build and Release

# Сборка ZapretControl.zip и публикация релиза при пуше тега vX.Y.Z
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # ручной запуск (сборка без релиза)

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # cryptography обязателен: его использует встроенный TG-прокси (tgproxy/_aes.py);
        # без него на Windows прокси не запускается (fallback рассчитан на libcrypto.so)
        run: pip install customtkinter==5.2.2 pyinstaller pystray pillow darkdetect cryptography

      - name: Build (onedir)
        run: pyinstaller --noconfirm --distpath dist --workpath build ZapretControl.spec

      - name: Package ZIP
        run: Compress-Archive -Path dist/ZapretControl -DestinationPath ZapretControl.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZapretControl
          path: ZapretControl.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Zapret GUI ${{ github.ref_name }}
          generate_release_notes: true
          files: ZapretControl.zip
